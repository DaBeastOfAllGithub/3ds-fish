name: Stockfish Compile Check

# This is a SEPARATE, throwaway check -- it does not build your actual
# 3DS app. Its only job is: "does Stockfish 11's source even compile
# under the same ARM compiler the 3DS uses, and if not, what breaks?"
#
# Run it manually from the Actions tab whenever you want to test this,
# rather than on every push (it's slow-ish and not part of your normal
# hello-world iteration loop).
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Clone Stockfish 11 source
        run: |
          git clone --branch sf_11 --depth 1 \
            https://github.com/official-stockfish/Stockfish.git stockfish-src

      - name: Patch known old-Stockfish-vs-new-compiler issues
        # Stockfish 11 (2020) wrote its own clamp() before C++17 added
        # std::clamp() to the language. Since some header pulls in
        # "using namespace std;", the compiler now sees two clamp()
        # candidates and refuses to guess. Fix: tell this one call to
        # explicitly use Stockfish's own version (the "::" means
        # "global scope, not std").
        run: |
          sed -i 's/clamp(npm_w + npm_b, EndgameLimit, MidgameLimit)/::clamp(npm_w + npm_b, EndgameLimit, MidgameLimit)/' \
            stockfish-src/src/material.cpp

      - name: Attempt compile (object files only, no linking)
        # -c            = compile each file to a .o, don't try to link a final binary
        #                 (linking needs main() and 3DS-specific setup we haven't done yet)
        # -march/-mtune = same ARM11 target as the real 3DS build
        # We deliberately do NOT use Stockfish's own Makefile yet -- its
        # Makefile assumes a desktop OS and will fight us. Instead we
        # just throw the compiler directly at every .cpp file and see
        # what yells.
        run: |
          # The container has devkitARM installed, but its "bin" folder
          # (where the actual compiler executable lives) isn't
          # necessarily on PATH for this kind of non-interactive shell.
          # DEVKITARM is an environment variable baked into the image
          # that points at where it's installed -- so we build the full
          # path to the compiler from that instead of guessing.
          echo "DEVKITARM is set to: $DEVKITARM"
          CXX="$DEVKITARM/bin/arm-none-eabi-g++"

          if [ ! -x "$CXX" ]; then
            echo "Compiler not found at $CXX -- listing what IS in that bin folder:"
            ls -la "$DEVKITARM/bin/" || echo "That folder doesn't even exist."
            exit 1
          fi

          mkdir -p build-check
          cd stockfish-src/src
          FAILED=0
          for f in *.cpp; do
            echo "--- Compiling $f ---"
            "$CXX" -c "$f" \
              -march=armv6k -mtune=mpcore -mfloat-abi=hard -mtp=soft \
              -std=gnu++17 -O1 -Wno-psabi \
              -o "../../build-check/${f%.cpp}.o" \
              || FAILED=1
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more files failed to compile -- see log above for the first errors."
            exit 1
          fi

      - name: Upload any partial build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stockfish-compile-objects
          path: build-check/
