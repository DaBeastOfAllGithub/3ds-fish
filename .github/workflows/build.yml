name: Build 3DS Homebrew

# Runs on every push to main, and can also be triggered manually from
# the "Actions" tab on GitHub (workflow_dispatch).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # This is the whole trick: GitHub spins up devkitPro's official
    # Docker image, which already has devkitARM + libctru installed.
    # Your Chromebook never installs any of this itself.
    container: devkitpro/devkitarm:latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Fetch Stockfish 11 source
        run: |
          git clone --branch sf_11 --depth 1 \
            https://github.com/official-stockfish/Stockfish.git stockfish-src

          # Stockfish's own main.cpp has its own main() function, and we
          # already have one in source/main.cpp. Two main()s can't link
          # together, and we don't want theirs anyway (it reads from a
          # real keyboard, which the 3DS doesn't have). Delete it.
          rm stockfish-src/src/main.cpp

          # Real tbprobe.cpp needs mmap(), which the 3DS doesn't have.
          # We provide our own stand-in instead (source/tablebase_stub.cpp)
          # that implements the same function names as no-ops, since we
          # never use tablebases anyway. Delete the real file so there's
          # no duplicate-symbol conflict with our stand-in.
          rm stockfish-src/src/syzygy/tbprobe.cpp

          # Same fix as before: Stockfish 11 predates std::clamp, so its
          # own hand-written clamp() collides with the compiler's C++17
          # one. Tell this one call to use Stockfish's own version.
          sed -i 's/clamp(npm_w + npm_b, EndgameLimit, MidgameLimit)/::clamp(npm_w + npm_b, EndgameLimit, MidgameLimit)/' \
            stockfish-src/src/material.cpp

      - name: Convert piece art to 3DS texture format
        run: |
          # tex3ds's --help lists an atlas (-a) mode for combining
          # multiple images into one spritesheet, but this specific
          # build's actual option parser rejects that flag outright --
          # a real mismatch between its help text and its behavior.
          # Simplest reliable path: convert each piece PNG into its own
          # separate .t3x file, one input at a time, so we never need
          # atlas mode or the options-file (-i) mechanism at all.
          TEX3DS="$DEVKITPRO/tools/bin/tex3ds"

          if [ ! -x "$TEX3DS" ]; then
            echo "tex3ds not found at $TEX3DS -- listing what IS there:"
            ls -la "$DEVKITPRO/tools/bin/" || echo "That folder doesn't even exist."
            exit 1
          fi

          mkdir -p romfs/gfx
          for name in white_king white_queen white_rook white_bishop white_knight white_pawn \
                      black_king black_queen black_rook black_bishop black_knight black_pawn; do
            echo "Converting gfx/${name}.png -> romfs/gfx/${name}.t3x"
            "$TEX3DS" -o "romfs/gfx/${name}.t3x" "gfx/${name}.png"
          done

      - name: Build
        run: make

      - name: Upload built .3dsx
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-3dsx
          path: '*.3dsx'
