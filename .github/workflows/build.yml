name: Build 3DS Homebrew

# Runs on every push to main, and can also be triggered manually from
# the "Actions" tab on GitHub (workflow_dispatch).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # This is the whole trick: GitHub spins up devkitPro's official
    # Docker image, which already has devkitARM + libctru installed.
    # Your Chromebook never installs any of this itself.
    container: devkitpro/devkitarm:latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Fetch Stockfish 11 source
        run: |
          git clone --branch sf_11 --depth 1 \
            https://github.com/official-stockfish/Stockfish.git stockfish-src

          # Stockfish's own main.cpp has its own main() function, and we
          # already have one in source/main.cpp. Two main()s can't link
          # together, and we don't want theirs anyway (it reads from a
          # real keyboard, which the 3DS doesn't have). Delete it.
          rm stockfish-src/src/main.cpp

          # Same fix as before: Stockfish 11 predates std::clamp, so its
          # own hand-written clamp() collides with the compiler's C++17
          # one. Tell this one call to use Stockfish's own version.
          sed -i 's/clamp(npm_w + npm_b, EndgameLimit, MidgameLimit)/::clamp(npm_w + npm_b, EndgameLimit, MidgameLimit)/' \
            stockfish-src/src/material.cpp

      - name: Show tbprobe.h for reference
        run: cat stockfish-src/src/syzygy/tbprobe.h

      - name: Build
        run: make

      - name: Upload built .3dsx
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-3dsx
          path: '*.3dsx'
